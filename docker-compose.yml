services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  orchestrator:
    build: .
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
